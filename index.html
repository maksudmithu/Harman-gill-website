<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Harmann Gill | Financial Advisor</title>
    <!-- Open Graph / Meta tags for link preview -->
    <meta property="og:title" content="Harmann Gill | Financial Advisor" />
    <meta property="og:description" content="Modern, responsive personal brand website for a financial professional focusing on lead generation and trust building." />
    <meta property="og:image" content="https://harmann-gill.netlify.app/profile.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Harmann Gill | Financial Advisor" />
    <meta name="twitter:description" content="Modern, responsive personal brand website for a financial professional focusing on lead generation and trust building." />
    <meta name="twitter:image" content="https://harmann-gill.netlify.app/profile.jpg" />
  </head>
  <body>
    <!-- A hidden HTML form for Netlify to discover the React form -->
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
      <button type="submit">Send</button>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
